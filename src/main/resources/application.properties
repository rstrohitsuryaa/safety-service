spring.application.name=safety-service
server.port=8083

# ── Own Database ─────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/bs_safety?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── IAM service URL (fallback if Eureka is unavailable) ────────────────────────────────────────────────────
iam-service.base-url=http://localhost:8082

# ── Eureka Client ────────────────────────────────────────────────────────────
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

app.jwt.secret=${JWT_SECRET:mySecretKey123456789012345678901234567890}


# ── Zipkin / Distributed Tracing ──────────────────────────────────────────────
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.file.name=logs/safety-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ── Circuit Breaker (Resilience4j) ────────────────────────────────────────────
spring.cloud.openfeign.circuitbreaker.enabled=true

# IAM circuit breaker
resilience4j.circuitbreaker.instances.iam-user-client.sliding-window-size=5
resilience4j.circuitbreaker.instances.iam-user-client.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.iam-user-client.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.iam-user-client.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.iam-user-client.automatic-transition-from-open-to-half-open-enabled=true

# Project service circuit breaker
resilience4j.circuitbreaker.instances.project-service.sliding-window-size=5
resilience4j.circuitbreaker.instances.project-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.project-service.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.project-service.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.project-service.automatic-transition-from-open-to-half-open-enabled=true
